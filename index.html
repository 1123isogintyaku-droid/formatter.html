<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ログ整形ツール</title>

<style>
body{
  font-family:'Hiragino Maru Gothic ProN', sans-serif;
  background:#f5f7fa;
  padding:20px;
}
textarea{
  width:100%;
  height:220px;
  margin-bottom:10px;
  border-radius:10px;
  padding:10px;
  border:1px solid #ccc;
}
button{
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#4CAF50;
  color:white;
  cursor:pointer;
}
pre{
  background:white;
  padding:15px;
  border-radius:10px;
  white-space:pre-wrap;
}
</style>

</head>
<body>

<h2>ログ整形ツール</h2>

<textarea id="input"></textarea>
<button onclick="convert()">整形する</button>

<h3>結果</h3>
<pre id="output"></pre>

<script>

function normalize(line){
  return line
    .replace(/[＊*]/g,"×")
    .replace(/セット|set/gi,"")
    .replace(/　/g," ") // 全角→半角
    .replace(/\s+/g," ")
    .trim();
}

// ★ここが今回の核
function splitMultiSets(line){
  // スペースで分割
  return line.split(" ");
}

function expandLine(line){

  line = normalize(line);
  line = line.replace(/回/g,"");

  let parts = splitMultiSets(line);
  let results = [];

  parts.forEach(part=>{

    if(!part) return;

    // 秒
    if(part.includes("秒")){
      let sec = part.match(/\d+/);
      let sets = part.match(/×(\d+)/);
      let count = sets ? parseInt(sets[1]) : 1;

      for(let i=0;i<count;i++){
        results.push(`自重×${sec[0]}秒`);
      }
      return;
    }

    // →
    if(part.includes("→")){
      let weightMatch = part.match(/(\d+(\.\d+)?)(?=kg|×)/);
      let weight = weightMatch ? weightMatch[1] : "自重";

      let reps = part.split("→").map(x=>parseInt(x));
      reps.forEach(r=>{
        results.push(`${weight}kg×${r}`);
      });
      return;
    }

    let nums = part.match(/\d+(\.\d+)?/g);
    if(!nums) return;

    let weight, reps, sets = 1;

    if(nums.length === 3){
      weight = nums[0];
      reps = nums[1];
      sets = nums[2];
    } else if(nums.length === 2){
      weight = nums[0];
      reps = nums[1];
    } else{
      return;
    }

    for(let i=0;i<sets;i++){
      results.push(`${weight}kg×${reps}`);
    }

  });

  return results;
}

function convert(){

  const input = document.getElementById("input").value;
  const lines = input.split("\n");

  let output="";

  lines.forEach(line=>{
    line=line.trim();
    if(!line) return;

    // 日付
    if(line.match(/^\d{1,2}\/\d{1,2}$/)){
      output += "\n" + line + "\n\n";
      return;
    }

    // セット行（×がある場合）
    if(line.includes("×") || line.includes("*") || line.includes("＊")){
      let sets = expandLine(line);
      sets.forEach(s=>{
        output += s + "\n";
      });
    } else {
      output += "\n" + line + "\n";
    }

  });

  document.getElementById("output").textContent = output;
}

</script>

</body>
</html>
