<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ログ整形ツール</title>

<style>
body{
  font-family:'Hiragino Maru Gothic ProN', sans-serif;
  background:#f5f7fa;
  padding:20px;
}

textarea{
  width:100%;
  height:200px;
  margin-bottom:10px;
  border-radius:10px;
  padding:10px;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#4CAF50;
  color:white;
  cursor:pointer;
}

pre{
  background:white;
  padding:15px;
  border-radius:10px;
  white-space:pre-wrap;
}
</style>

</head>
<body>

<h2>ログ整形ツール</h2>

<textarea id="input" placeholder="ここにそのまま貼る"></textarea>
<button onclick="convert()">整形する</button>

<h3>結果</h3>
<pre id="output"></pre>

<script>

function normalize(line){
  return line
    .replace(/\*/g,"×")
    .replace(/セット|set/gi,"")
    .replace(/\s+/g," ");
}

function expandLine(line){

  line = normalize(line);
  line = line.replace(/回/g,"");

  // 重量取得
  let weightMatch = line.match(/(\d+(\.\d+)?)kg/);
  let weight = weightMatch ? weightMatch[1] : "自重";

  // 秒系
  if(line.includes("秒")){
    let sec = line.match(/\d+/);
    let sets = line.match(/×(\d+)/);
    let count = sets ? parseInt(sets[1]) : 1;

    let res=[];
    for(let i=0;i<count;i++){
      res.push(`自重×${sec[0]}秒`);
    }
    return res;
  }

  // →展開
  if(line.includes("→")){
    let reps = line.split("→").map(x=>parseInt(x));
    return reps.map(r=>`${weight}kg×${r}`);
  }

  // 通常
  let match = line.match(/(\d+)×(\d+)/);

  if(match){
    let reps = parseInt(match[2]);
    let setsMatch = line.match(/×(\d+)$/);
    let sets = setsMatch ? parseInt(setsMatch[1]) : 1;

    let res=[];
    for(let i=0;i<sets;i++){
      res.push(`${weight}kg×${reps}`);
    }
    return res;
  }

  return [];
}

function convert(){

  const input = document.getElementById("input").value;
  const lines = input.split("\n");

  let output="";
  let currentExercise="";

  lines.forEach(line=>{
    line=line.trim();
    if(!line) return;

    // 日付
    if(line.match(/^\d{1,2}\/\d{1,2}$/)){
      output += "\n" + line + "\n\n";
      return;
    }

    // 数字スタートならセット行
    if(/^\d/.test(line) || line.includes("kg")){
      let sets = expandLine(line);
      sets.forEach(s=>{
        output += s + "\n";
      });
    }else{
      // 種目
      currentExercise = line;
      output += "\n" + currentExercise + "\n";
    }

  });

  document.getElementById("output").textContent = output;
}

</script>

</body>
</html>
