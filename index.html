<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ログ整形ツール</title>

<style>
body{
  font-family:'Hiragino Maru Gothic ProN', sans-serif;
  background:#f5f7fa;
  padding:20px;
}
textarea{
  width:100%;
  height:220px;
  margin-bottom:10px;
  border-radius:10px;
  padding:10px;
  border:1px solid #ccc;
}
button{
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#4CAF50;
  color:white;
  cursor:pointer;
}
pre{
  background:white;
  padding:15px;
  border-radius:10px;
  white-space:pre-wrap;
}
</style>

</head>
<body>

<h2>ログ整形ツール</h2>

<textarea id="input"></textarea>
<button onclick="convert()">整形する</button>

<h3>結果</h3>
<pre id="output"></pre>

<script>

function normalize(line){
  return line
    .replace(/[＊*]/g,"×")
    .replace(/セット|set/gi,"")
    .replace(/\s+/g," ")
    .trim();
}

function expandLine(line){

  line = normalize(line);
  line = line.replace(/回/g,"");

  // 秒
  if(line.includes("秒")){
    let sec = line.match(/\d+/);
    let sets = line.match(/×(\d+)/);
    let count = sets ? parseInt(sets[1]) : 1;

    let res=[];
    for(let i=0;i<count;i++){
      res.push(`自重×${sec[0]}秒`);
    }
    return res;
  }

  // →
  if(line.includes("→")){
    let weightMatch = line.match(/(\d+(\.\d+)?)(?=kg|×)/);
    let weight = weightMatch ? weightMatch[1] : "自重";

    let reps = line.split("→").map(x=>parseInt(x));
    return reps.map(r=>`${weight}kg×${r}`);
  }

  let nums = line.match(/\d+(\.\d+)?/g);
  if(!nums) return [];

  let weight, reps, sets = 1;

  if(nums.length === 3){
    weight = nums[0];
    reps = nums[1];
    sets = nums[2];
  } else if(nums.length === 2){
    weight = nums[0];
    reps = nums[1];
  } else{
    return [];
  }

  let res=[];
  for(let i=0;i<sets;i++){
    res.push(`${weight}kg×${reps}`);
  }

  return res;
}

function convert(){

  const input = document.getElementById("input").value;
  const lines = input.split("\n");

  let output="";

  lines.forEach(line=>{
    line=line.trim();
    if(!line) return;

    // 日付
    if(line.match(/^\d{1,2}\/\d{1,2}$/)){
      output += "\n" + line + "\n\n";
      return;
    }

    // ★ここ修正：×がある時だけセット扱い
    if(line.includes("×") || line.includes("*") || line.includes("＊")){
      let sets = expandLine(line);
      sets.forEach(s=>{
        output += s + "\n";
      });
    } else {
      // 種目（カッコ付きもそのまま）
      output += "\n" + line + "\n";
    }

  });

  document.getElementById("output").textContent = output;
}

</script>

</body>
</html>
